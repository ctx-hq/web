name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Deploy job needs write permissions for PR comments and Pages deployment
permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  NODE_VERSION: "22"
  PAGES_PROJECT: ctx-web
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  # ──────────────────────────────────────────────
  # CI: test, typecheck, build
  # ──────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Deploy: production (main) or preview (PR)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: ci
    # Skip deploy for fork PRs and Dependabot — secrets are not available
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ env.PAGES_PROJECT }}
            --branch=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}

      # ── Production: purge CDN cache ──
      - name: Purge CDN cache
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          response=$(curl -s --fail-with-body -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ env.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          # jq is pre-installed on ubuntu-latest runners
          if ! echo "$response" | jq -e '.success' > /dev/null 2>&1; then
            echo "::warning::CDN cache purge failed: $response"
          fi

      # ── PR: comment preview URL ──
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-pages-preview -->';
            const deployUrl = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';
            const body = [
              marker,
              `### Preview Deployment`,
              '',
              `| | |`,
              `|---|---|`,
              `| **URL** | ${deployUrl} |`,
              `| **Branch** | \`pr-${context.issue.number}\` |`,
              `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
